CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_BLE=y
CONFIG_BT=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_KEYBOARD_NAME="Totem Keyboard"

# Re-bond cleanly after macOS wakes - commenting out because it forces a keycode in Windows
# CONFIG_BT_SMP_ALLOW_UNAUTH_OVERWRITE=y

# Deep sleep — battery saving testing
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# Report battery level of BOTH split halves to the host (for Mighty Mitts)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
